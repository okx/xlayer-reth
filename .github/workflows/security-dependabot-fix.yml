name: Dependabot Security Fix

on:
  schedule:
    - cron: '0 9 * * *'  # Run once per day at 9 AM UTC
  workflow_dispatch:      # Allow manual triggering for testing

jobs:
  check-and-fix-security:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      security-events: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Dependabot high/medium security alerts
        id: alerts
        uses: actions/github-script@v7
        with:
          script: |
            let hasAlerts = false;
            let alertsSummary = '';

            try {
              const { data } = await github.rest.dependabot.listAlertsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              const filtered = data.filter(a => {
                const sev = a.security_advisory?.severity?.toLowerCase();
                return ['critical', 'high', 'medium'].includes(sev);
              });

              if (filtered.length === 0) {
                console.log('No critical/high/medium security alerts found. Nothing to do.');
              } else {
                hasAlerts = true;
                const summary = filtered.map(a => ({
                  number: a.number,
                  package: a.dependency?.package?.name,
                  ecosystem: a.dependency?.package?.ecosystem,
                  manifest_path: a.dependency?.manifest_path,
                  scope: a.dependency?.scope,
                  severity: a.security_advisory?.severity,
                  summary: a.security_advisory?.summary,
                  description: (a.security_advisory?.description ?? '').substring(0, 500),
                  vulnerable_range: a.security_vulnerability?.vulnerable_version_range,
                  first_patched: a.security_vulnerability?.first_patched_version?.identifier,
                  cve: a.security_advisory?.cve_id,
                  ghsa: a.security_advisory?.ghsa_id,
                  url: a.html_url,
                }));
                alertsSummary = JSON.stringify(summary, null, 2);
                console.log(`Found ${filtered.length} critical/high/medium alert(s):`);
                summary.forEach(a => console.log(`  [${a.severity}] ${a.package} — ${a.cve ?? a.ghsa} (fixed in ${a.first_patched ?? 'unknown'})`));
              }
            } catch (e) {
              console.log('Could not fetch Dependabot alerts:', e.message);
            }

            core.setOutput('has_alerts', hasAlerts ? 'true' : 'false');
            core.setOutput('alerts_summary', alertsSummary);

      - name: Count security fix PRs already opened today
        id: pr-budget
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

            // List open PRs whose branch starts with fix/security- and were created today
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const openedToday = prs.filter(pr => {
              const branch = pr.head.ref;
              const createdDate = pr.created_at.slice(0, 10);
              return branch.startsWith('fix/security-') && createdDate === today;
            });

            const MAX_PRS_PER_DAY = 2;
            const remaining = Math.max(0, MAX_PRS_PER_DAY - openedToday.length);

            console.log(`Security fix PRs opened today: ${openedToday.length} / ${MAX_PRS_PER_DAY}`);
            console.log(`Remaining budget for this run: ${remaining}`);
            openedToday.forEach(pr => console.log(`  Already opened: #${pr.number} — ${pr.title} (${pr.head.ref})`));

            core.setOutput('remaining', String(remaining));

      - name: Configure git identity
        if: steps.alerts.outputs.has_alerts == 'true' && steps.pr-budget.outputs.remaining != '0'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Run Claude to analyze and fix security issues
        if: steps.alerts.outputs.has_alerts == 'true' && steps.pr-budget.outputs.remaining != '0'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a security engineer. The following Dependabot CRITICAL/HIGH/MEDIUM severity alerts are open in this Rust repository (xlayer-reth):

            ${{ steps.alerts.outputs.alerts_summary }}

            **DAILY PR BUDGET: You may open at most ${{ steps.pr-budget.outputs.remaining }} PR(s) in this run.**
            Keep a running count of PRs you open. Stop opening PRs as soon as you reach this limit, even if more alerts remain.

            For EACH alert (processed in order, highest severity first), follow this process:

            ---

            **STEP 1 — Check daily budget**
            If you have already opened ${{ steps.pr-budget.outputs.remaining }} PR(s) in this run, stop processing further alerts and go directly to the summary.

            ---

            **STEP 2 — Analyze the vulnerability**
            - Review the `manifest_path` field to locate which `Cargo.toml` file declares the dependency
            - Read the relevant `Cargo.toml` to determine whether the package is a **direct** or **transitive** dependency
            - Note the `first_patched` version — this is the minimum safe version to upgrade to
            - Evaluate whether upgrading to `first_patched` is a semver-compatible change (patch or minor bump = usually safe; major bump = risky)

            ---

            **STEP 3 — Apply the fix (only if confident it is safe)**

            Only proceed if:
            - A `first_patched` version exists
            - The version bump is semver-compatible (no major version change)

            If all conditions are met:

            a) Check out a new branch from main:
               `git checkout main && git pull origin main && git checkout -b fix/security-<package-name>-alert-<alert-number>`

            b) **Direct dependency** (appears in a `Cargo.toml` `[dependencies]` or `[workspace.dependencies]` section):
               Edit the relevant `Cargo.toml` to bump the version to `first_patched` or higher.

            c) **Transitive dependency** (not directly in `Cargo.toml`):
               Run: `cargo update <package> --precise <first_patched_version>`
               This updates `Cargo.lock` without modifying `Cargo.toml`.

            d) Run a quick sanity check: `cargo check --workspace 2>&1 | tail -20`
               If it fails, revert changes (`git checkout .`), skip this alert, and note the failure.

            e) Commit: `git add -A && git commit -m "fix(deps): update <package> to <version> to resolve <CVE or GHSA>"`

            f) Push: `git push origin fix/security-<package-name>-alert-<alert-number>`

            g) Open PR:
               ```
               gh pr create \
                 --title "fix(deps): update <package> to <version> (<severity> <CVE or GHSA>)" \
                 --body "## Description

               Security dependency update to resolve a **<severity>** severity vulnerability.

               ## Type of Change
               - [x] Bug fix (non-breaking change which fixes an issue)

               ## Security Alert
               - **Alert**: <url>
               - **CVE / GHSA**: <cve or ghsa>
               - **Package**: <package>
               - **Severity**: <severity>
               - **Vulnerable versions**: <vulnerable_range>
               - **Fixed in**: <first_patched>
               - **Summary**: <summary>

               ## Change

               <Describe exactly what was changed — e.g., bumped direct dependency in Cargo.toml or updated Cargo.lock via cargo update>

               ## Checklist
               - [x] I have reviewed the relevant code guidelines in the \`docs/\` folder
               - [x] My code follows the coding standards of this project
               - [x] I have performed a self-review of my own code" \
                 --base main
               ```

            h) **Increment your internal PR count by 1.**

            ---

            **SKIP the alert (without opening a PR) if any of the following are true:**
            - Daily budget is exhausted (you have already opened ${{ steps.pr-budget.outputs.remaining }} PR(s) this run)
            - No `first_patched` version is listed
            - The fix requires a major version bump (e.g., v1.x → v2.x), which likely involves breaking API changes
            - `cargo check --workspace` fails after the fix is applied
            - You are not confident the change is safe

            ---

            **After processing all alerts**, print a clear summary table:
            | Alert # | Package | Severity | Action Taken | Reason (if skipped) |
            |---------|---------|----------|--------------|---------------------|
            | ...     | ...     | ...      | Fixed / Skipped | ... |
