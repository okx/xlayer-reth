# ==============================================================================
# Patch Section
# Required because paradigm reth v1.11.3 (git) transitively depends on
# op-alloy crates from crates.io. We redirect them to the local optimism
# workspace versions to avoid duplicate/conflicting types.
#
# Duplicated by (from reth git):
#   op-alloy-consensus:        reth-codecs, reth-db-api, reth-primitives-traits, reth-rpc-convert
#   op-alloy-rpc-types-engine: reth-payload-primitives, reth-engine-local
#   op-alloy-network:          reth-rpc-convert
#   op-alloy-rpc-types:        reth-rpc-convert
# Duplicated by (from crates.io):
#   alloy-op-hardforks:        alloy-evm
# ==============================================================================
[patch.crates-io]
op-alloy-consensus = { git = "https://github.com/okx/optimism", rev = "3a4ab7cbdd258ecdad1df58ffcbfdaeed0a3d8df" }
op-alloy-rpc-types-engine = { git = "https://github.com/okx/optimism", rev = "3a4ab7cbdd258ecdad1df58ffcbfdaeed0a3d8df" }
op-alloy-network = { git = "https://github.com/okx/optimism", rev = "3a4ab7cbdd258ecdad1df58ffcbfdaeed0a3d8df" }
op-alloy-rpc-types = { git = "https://github.com/okx/optimism", rev = "3a4ab7cbdd258ecdad1df58ffcbfdaeed0a3d8df" }
alloy-op-hardforks = { git = "https://github.com/okx/optimism", rev = "3a4ab7cbdd258ecdad1df58ffcbfdaeed0a3d8df" }
alloy-op-evm = { git = "https://github.com/okx/optimism", rev = "3a4ab7cbdd258ecdad1df58ffcbfdaeed0a3d8df" }
op-alloy = { git = "https://github.com/okx/optimism", rev = "3a4ab7cbdd258ecdad1df58ffcbfdaeed0a3d8df" }
# Security patch: upgrade jsonwebtoken to 10.3.0 (CVE-2026-25537)
# alloy-rpc-types-engine 1.6.3 requires jsonwebtoken ^9.3.0 (^9 semver),
# which does not include 10.x. This local fork pins jsonwebtoken to 10.3.0.
alloy-rpc-types-engine = { path = "deps/alloy-rpc-types-engine" }
# Security patch: remove yamux 0.12.x (CVE-2026-32314) from libp2p-yamux 0.47.0.
# libp2p-yamux 0.47.0 depends on both yamux 0.12.x (legacy) and 0.13.x (default).
# This local fork drops yamux012 and uses only yamux 0.13.x (already patched).
libp2p-yamux = { path = "deps/libp2p-yamux" }
