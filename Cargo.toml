# alloy-primitives + alloy-sol-types stay on 1.5.x (not 1.6+) to avoid the
# secp256k1 version conflict introduced in alloy-primitives 1.6, matching
# reth v2.0.0's own pin.
# ==============================================================================
alloy-chains = { version = "0.2.33", default-features = false }
alloy-contract = { version = "1.8.2" }
alloy-consensus = { version = "1.8.2", default-features = false }
alloy-eips = { version = "1.8.2", default-features = false }
alloy-eip7928 = { version = "0.3.0", default-features = false }
alloy-evm = { version = "0.30.0", default-features = false }
alloy-genesis = { version = "1.8.2", default-features = false }
alloy-json-rpc = { version = "1.8.2" }
alloy-network = { version = "1.8.2", default-features = false }
alloy-primitives = { version = "1.5.6", default-features = false, features = [
    "map-foldhash",
] }
alloy-provider = { version = "1.8.2" }
alloy-rlp = { version = "0.3.13", default-features = false, features = [
    "core-net",
] }
alloy-rpc-client = { version = "1.8.2" }
alloy-rpc-types-beacon = { version = "1.8.2", features = ["ssz"] }
alloy-rpc-types-engine = { version = "1.8.2", default-features = false }
alloy-rpc-types-eth = { version = "1.8.2" }
alloy-serde = { version = "1.8.2" }
alloy-signer-local = { version = "1.8.2", default-features = false }
alloy-sol-types = { version = "1.5.6", default-features = false }
alloy-transport-http = { version = "1.8.2", features = [
    "reqwest-rustls-tls",
], default-features = false }
alloy-transport = { version = "1.8.2" }
alloy-hardforks = { version = "0.4.5", default-features = false }

# op-alloy (from local optimism/rust, with version for compat)
alloy-op-evm = { version = "0.30.0", path = "deps/optimism/rust/alloy-op-evm/", default-features = false }
alloy-op-hardforks = { version = "0.4.7", path = "deps/optimism/rust/alloy-op-hardforks/", default-features = false }
op-alloy-consensus = { version = "0.24.0", path = "deps/optimism/rust/op-alloy/crates/consensus", default-features = false }
op-alloy-flz = { version = "0.13.1", default-features = false }
op-alloy-network = { version = "0.24.0", path = "deps/optimism/rust/op-alloy/crates/network", default-features = false }
op-alloy-rpc-types = { version = "0.24.0", path = "deps/optimism/rust/op-alloy/crates/rpc-types", default-features = false }
op-alloy-rpc-types-engine = { version = "0.24.0", path = "deps/optimism/rust/op-alloy/crates/rpc-types-engine", default-features = false }

