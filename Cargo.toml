# libp2p-yamux 0.47.0 depends on both yamux 0.12.x (legacy) and 0.13.x (default).
# This local fork drops yamux012 and uses only yamux 0.13.x (already patched).
libp2p-yamux = { path = "deps/libp2p-yamux" }
