[package]
name = "libp2p-yamux"
edition = "2021"
rust-version = "1.73"
description = "Yamux multiplexing protocol for libp2p (yamux012 removed for CVE-2026-32314)"
version = "0.47.0"
authors = ["Parity Technologies <admin@parity.io>"]
license = "MIT"
repository = "https://github.com/libp2p/rust-libp2p"
keywords = ["peer-to-peer", "libp2p", "networking"]
categories = ["network-programming", "asynchronous"]

[dependencies]
either = "1"
futures = "0.3"
libp2p-core = "0.43"
thiserror = "2"
yamux = { version = "0.13.3", package = "yamux" }
tracing = "0.1"
