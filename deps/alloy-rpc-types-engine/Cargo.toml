# XLayer security patch: jsonwebtoken upgraded to 10.3.0 (CVE-2026-25537)
# This is a local fork of alloy-rpc-types-engine 1.8.3 pinned to jsonwebtoken 10.3.0
# with the rust_crypto backend enabled. Referenced via [patch.crates-io] in the
# workspace root Cargo.toml.
#
# THIS FILE IS AUTOMATICALLY GENERATED BY CARGO
#
# When uploading crates to the registry Cargo will automatically
# "normalize" Cargo.toml files for maximal compatibility
# with all versions of Cargo and also rewrite `path` dependencies
# to registry (e.g., crates.io) dependencies.
#
# If you are reading this file be aware that the original Cargo.toml
# will likely look very different (and much more reasonable).
# See Cargo.toml.orig for the original contents.

[package]
edition = "2021"
rust-version = "1.91"
name = "alloy-rpc-types-engine"
version = "1.8.3"
authors = ["Alloy Contributors"]
build = false
exclude = [
    "benches/",
    "tests/",
    "testdata/",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Types for the `engine` Ethereum JSON-RPC namespace"
homepage = "https://github.com/alloy-rs/alloy"
readme = "README.md"
license = "MIT OR Apache-2.0"
repository = "https://github.com/alloy-rs/alloy"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "-Zunstable-options",
    "--generate-link-to-definition",
    "--show-type-layout",
]

[features]
arbitrary = [
    "dep:arbitrary",
    "std",
    "alloy-primitives/arbitrary",
    "alloy-serde/arbitrary",
    "alloy-consensus/arbitrary",
    "alloy-eips/arbitrary",
]
default = [
    "jwt",
    "std",
    "serde",
]
jwt = [
    "std",
    "dep:jsonwebtoken",
    "dep:rand",
    "jsonwebtoken?/rust_crypto",
]
kzg = [
    "alloy-consensus/kzg",
    "alloy-eips/kzg",
]
serde = [
    "dep:serde",
    "dep:alloy-serde",
    "alloy-consensus/serde",
    "alloy-eips/serde",
    "alloy-primitives/serde",
    "rand?/serde",
]
ssz = [
    "std",
    "dep:ethereum_ssz",
    "dep:ethereum_ssz_derive",
    "alloy-eips/ssz",
]
std = [
    "alloy-consensus/std",
    "derive_more/std",
    "strum/std",
    "alloy-eips/std",
    "alloy-serde?/std",
    "alloy-primitives/std",
    "alloy-rlp/std",
    "serde?/std",
]

[lib]
name = "alloy_rpc_types_engine"
path = "src/lib.rs"

[dependencies.alloy-consensus]
version = "1.8.3"
features = ["serde"]
default-features = false

[dependencies.alloy-eips]
version = "1.8.3"
features = ["serde"]
default-features = false

[dependencies.alloy-primitives]
version = "1.4.1"
features = [
    "rlp",
    "serde",
]
default-features = false

[dependencies.alloy-rlp]
version = "0.3.9"
features = [
    "arrayvec",
    "derive",
]
default-features = false

[dependencies.alloy-serde]
version = "1.8.3"
optional = true
default-features = false

[dependencies.arbitrary]
version = "1.3"
features = ["derive"]
optional = true

[dependencies.derive_more]
version = "2"
features = ["display"]
default-features = false

[dependencies.ethereum_ssz]
version = "0.9"
optional = true

[dependencies.ethereum_ssz_derive]
version = "0.9"
optional = true

[dependencies.jsonwebtoken]
version = "10.3.0"
optional = true
default-features = false

[dependencies.rand]
version = "0.8"
optional = true

[dependencies.serde]
version = "1.0.226"
features = [
    "derive",
    "alloc",
    "derive",
]
optional = true
default-features = false

[dependencies.strum]
version = "0.27"
features = ["derive"]
default-features = false

[dev-dependencies.alloy-consensus]
version = "1.8.3"
features = ["arbitrary"]
default-features = false

[dev-dependencies.alloy-primitives]
version = "1.4.1"
features = [
    "rand",
    "rlp",
    "serde",
    "arbitrary",
]
default-features = false

[dev-dependencies.arbitrary]
version = "1.3"
features = ["derive"]

[dev-dependencies.assert_matches]
version = "1.5"

[dev-dependencies.rand]
version = "0.8"

[dev-dependencies.serde_json]
version = "1.0"
features = ["alloc"]
default-features = false

[dev-dependencies.similar-asserts]
version = "1.5"

[dev-dependencies.tempfile]
version = "3.20"

[lints.clippy]
large-enum-variant = "allow"
missing-const-for-fn = "warn"
redundant-clone = "warn"
result-large-err = "allow"
use-self = "warn"

[lints.clippy.all]
level = "warn"
priority = -1

[lints.rust]
missing-debug-implementations = "warn"
missing-docs = "warn"
rust-2018-idioms = "deny"
unnameable-types = "warn"
unreachable-pub = "warn"
unused-must-use = "deny"

[lints.rustdoc]
all = "warn"
